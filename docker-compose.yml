services:
  db:
    image: mysql:8.0
    container_name: tms_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: teste_tms
      MYSQL_USER: tms
      MYSQL_PASSWORD: tms
      MYSQL_ROOT_PASSWORD: "1234"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tms_backend
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DB_URL: mysql://tms:tms@db:3306/teste_tms
      DB_HOST: db
      DB_SOCKET: ""
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    command: ["/usr/local/bin/docker-entrypoint.sh"]

  frontend:
    image: node:20-alpine
    container_name: tms_frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"

volumes:
  db_data:
  backend_vendor:
  frontend_node_modules:
